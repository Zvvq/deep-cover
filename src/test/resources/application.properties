spring.application.name=deep-cover-test

# 测试环境使用内存仓库，不依赖 Redis
deep-cover.room.repository=memory
deep-cover.game-timer.repository=memory
deep-cover.vote.repository=memory
deep-cover.chat.repository=memory
deep-cover.word-assignment.repository=memory
deep-cover.word-description.repository=memory
deep-cover.lock.provider=none

# Agent Runtime integration disabled in tests
deep-cover.agent.enabled=false
deep-cover.agent.base-url=http://localhost:8000
deep-cover.agent.event-path=/agent/rooms/{roomCode}/events
deep-cover.agent.internal-secret=dev-agent-secret
