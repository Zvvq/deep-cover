spring.application.name=deep-cover

# AI 决策服务默认关闭，避免当前没有 Python 服务时影响 Java 项目启动。
deep-cover.ai.enabled=false
deep-cover.ai.base-url=http://localhost:8000
deep-cover.ai.speech-path=/ai/speech/decide
deep-cover.ai.vote-path=/ai/vote/decide
deep-cover.ai.speech-interval-ms=5000

# 旧版“Java 定时询问 AI 决策”模式默认关闭；新版 Agent Runtime 由 Python 自己调度。
deep-cover.ai.decision.enabled=false

# Agent Runtime 集成层配置。默认不推送到 Python，避免本地没有 Python 服务时影响游戏。
deep-cover.agent.enabled=false
deep-cover.agent.base-url=http://localhost:8000
deep-cover.agent.event-path=/agent/rooms/{roomCode}/events
deep-cover.agent.internal-secret=dev-agent-secret
