spring.application.name=deep-cover

# Agent Runtime integration. Enable it only when the Python Agent service is running.
deep-cover.agent.enabled=true
deep-cover.agent.base-url=http://localhost:8000
deep-cover.agent.event-path=/agent/rooms/{roomCode}/events
deep-cover.agent.internal-secret=dev-agent-secret

# Redis configuration
deep-cover.room.repository=redis
deep-cover.game-timer.repository=redis
deep-cover.vote.repository=redis
deep-cover.chat.repository=redis
deep-cover.word-assignment.repository=redis
deep-cover.word-description.repository=redis
deep-cover.lock.provider=redisson
deep-cover.redis.room-ttl=PT2H
deep-cover.redis.ended-room-ttl=PT10M
deep-cover.redis.lock-wait-time=PT2S
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000
