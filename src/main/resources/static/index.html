<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Cover — 社交推理游戏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==================== HOME VIEW ==================== -->
  <main id="home-view" class="view">
    <div class="home-container">
      <header class="home-header">
        <h1 class="logo">DEEP COVER</h1>
        <p class="tagline">社交推理游戏 · 找出潜伏者</p>
      </header>

      <div class="home-actions">
        <button id="btn-create" class="btn btn-primary btn-lg" disabled>
          <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          创建房间
        </button>

        <div class="divider"><span>或</span></div>

        <form id="join-form" class="join-form" autocomplete="off">
          <div class="input-group">
            <input
              id="room-code-input"
              type="text"
              class="input"
              placeholder="输入房间码"
              maxlength="6"
              minlength="6"
              autocomplete="off"
            >
            <button id="btn-join" type="submit" class="btn btn-secondary" disabled>
              <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
              加入房间
            </button>
          </div>
          <p id="join-error" class="field-error" hidden></p>
        </form>
      </div>

      <p id="home-status" class="status-text" hidden></p>
    </div>
  </main>

  <!-- ==================== WAITING ROOM VIEW ==================== -->
  <main id="waiting-view" class="view" hidden>
    <div class="room-container">
      <header class="room-header">
        <button id="btn-leave-waiting" class="btn btn-ghost btn-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7M5 12h14"/></svg>
          退出
        </button>
        <div class="room-code-badge">
          <span class="room-code-label">房间</span>
          <span id="waiting-room-code" class="room-code-value"></span>
        </div>
        <span id="waiting-room-status" class="room-status-pill"></span>
      </header>

      <div class="room-body">
        <section class="player-section">
          <h2 class="section-title">玩家 <span id="waiting-player-count" class="count-badge"></span></h2>
          <ul id="waiting-player-list" class="player-list"></ul>
        </section>

        <p id="waiting-hint" class="hint-text" hidden>至少需要 2 名玩家才能开始游戏</p>
      </div>

      <footer class="room-footer">
        <button id="btn-start-game" class="btn btn-primary btn-lg" hidden>
          <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始游戏
        </button>
      </footer>
    </div>
  </main>

  <!-- ==================== GAME VIEW ==================== -->
  <main id="game-view" class="view" hidden>
    <div class="game-layout">
      <!-- Top bar -->
      <header class="game-topbar">
        <div class="game-room-info">
          <span id="game-room-code" class="room-code-value"></span>
        </div>
        <div id="timer-display" class="timer-display">
          <svg class="timer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="timer-value" class="timer-value">--:--</span>
        </div>
        <span id="game-phase-badge" class="phase-badge"></span>
      </header>

      <!-- Chat panel -->
      <section class="chat-panel">
        <div id="chat-messages" class="chat-messages">
          <p class="chat-placeholder">游戏开始，讨论吧…</p>
        </div>
        <form id="chat-form" class="chat-input-bar" autocomplete="off">
          <input
            id="chat-input"
            type="text"
            class="input chat-input"
            placeholder="输入消息…"
            maxlength="300"
            autocomplete="off"
          >
          <button id="btn-send" type="submit" class="btn btn-primary btn-icon" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </form>
      </section>

      <!-- Sidebar -->
      <aside class="game-sidebar">
        <h2 class="section-title">玩家 <span id="game-player-count" class="count-badge"></span></h2>
        <ul id="game-player-list" class="player-list"></ul>
      </aside>
    </div>
  </main>

  <script>
    // API base: /api/rooms
    window.DC_CONFIG = { apiBase: '/api/rooms' };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
