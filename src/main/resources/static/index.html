<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Cover</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="app-shell" data-room-api="/api/rooms" data-ws-entry="/ws">
    <section class="hero">
        <div>
            <p class="eyebrow">Deep Cover</p>
            <h1>卧底群聊</h1>
            <p class="subtitle">创建房间、邀请玩家、开始后进入实时聊天。</p>
        </div>
        <div class="status-pill" id="connectionStatus">未进入房间</div>
    </section>

    <section class="layout">
        <section class="panel lobby-panel" id="lobbyPanel">
            <div class="panel-heading">
                <div>
                    <h2>进入游戏</h2>
                    <p>房主创建房间，其他玩家输入房间号加入。</p>
                </div>
            </div>

            <div class="action-row">
                <button class="primary-button" id="createRoomButton" type="button">创建房间</button>
            </div>

            <div class="divider"><span>或</span></div>

            <form class="join-form" id="joinRoomForm">
                <label for="roomCodeInput">房间号</label>
                <div class="input-row">
                    <input id="roomCodeInput" name="roomCode" autocomplete="off" maxlength="6" placeholder="例如 ABC123">
                    <button type="submit">加入</button>
                </div>
            </form>
        </section>

        <section class="panel room-panel" id="roomPanel" hidden>
            <div class="panel-heading room-heading">
                <div>
                    <h2 id="roomTitle">房间</h2>
                    <p id="roomSubtitle">等待房主开始游戏</p>
                </div>
                <button class="ghost-button" id="refreshButton" type="button">刷新</button>
            </div>

            <div class="room-meta">
                <div>
                    <span>状态</span>
                    <strong id="roomStatus">WAITING</strong>
                </div>
                <div>
                    <span>玩家</span>
                    <strong id="playerCount">0</strong>
                </div>
                <div>
                    <span>我的身份</span>
                    <strong id="myRole">未知</strong>
                </div>
            </div>

            <div class="section-block">
                <h3>玩家列表</h3>
                <ul class="player-list" id="playerList"></ul>
            </div>

            <div class="section-block chat-section">
                <div class="chat-heading">
                    <h3>聊天</h3>
                    <span id="chatStatus">等待开始</span>
                </div>
                <ul class="chat-list" id="chatList"></ul>
                <form class="chat-form" id="chatForm">
                    <input id="chatInput" maxlength="300" autocomplete="off" placeholder="输入消息">
                    <button type="submit">发送</button>
                </form>
            </div>

            <div class="room-actions">
                <button class="primary-button" id="startRoomButton" type="button">开始游戏</button>
                <button class="danger-button" id="leaveRoomButton" type="button">离开房间</button>
            </div>
        </section>
    </section>

    <section class="message-area" id="messageArea" aria-live="polite"></section>
</main>

<script src="/app.js"></script>
</body>
</html>
